<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kayıp Risk Haritası</title>
<style>
  :root{
    --text-primary:#16181C;
    --text-secondary:#6B6B6B;
    --text-muted:#9A9A9A;
    --text-danger:#791F1F;
    --text-warning:#633806;
    --text-success:#085041;
    --bg-danger:#FCEBEB;
    --bg-warning:#FAEEDA;
    --bg-success:#E1F5EE;
    --surface-1:#F1EFE8;
    --border-strong:#D8D4C8;
    --radius:10px;
    --page-bg:#FFFFFF;
  }

  *{ box-sizing:border-box; }

  /* Sayfayı tam ekran yüksekliğine sabitledik ve dışarı taşmayı engelledik */
  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
  }

  body{
    background:var(--page-bg);
    color:var(--text-primary);
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* Ana kapsayıcı dikeyde esnek (flex) yapıldı ve ekrana sığdırıldı */
  .wrap{
    width: 100%;
    max-width: 900px;
    height: 100vh;
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .header-row{
    position:relative;
    margin-bottom: 2px;
    flex-shrink: 0;
  }

  .logo{
    position:absolute;
    top:0;
    right:0;
    height:28px;
    width:auto;
  }

  h1{
    font-size:18px;
    font-weight:700;
    margin:0;
    text-align:center;
  }

  /* Slider alanları dikey alanı daraltmak için küçültüldü */
  .filter-row {
    display:flex; 
    gap:16px; 
    flex-wrap:wrap; 
    margin-top:12px; 
    margin-bottom:12px;
    flex-shrink: 0;
  }

  .kpi-container {
    display:grid; 
    grid-template-columns:repeat(auto-fit, minmax(140px, 1fr)); 
    gap:10px; 
    margin-bottom:12px;
    flex-shrink: 0;
  }

  .kpi-card{
    position:relative;
    border-radius:var(--radius);
    padding:0.75rem;
    padding-right:2.2rem;
  }

  .kpi-amount{
    font-size:11px;
    margin:2px 0 0;
  }

  .kpi-trend{
    font-size:10px;
    margin:4px 0 0;
    display:flex;
    align-items:center;
    gap:4px;
  }

  .kpi-action{
    font-size:11px;
    font-weight:700;
    margin:4px 0 0;
    padding-top:4px;
    border-top:1px solid rgba(0,0,0,0.08);
  }

  .detail-btn{
    position:absolute;
    top:8px;
    right:8px;
    width:20px;
    height:20px;
    border-radius:4px;
    border:none;
    background:rgba(255,255,255,0.6);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    padding:0;
  }
  .detail-btn:hover{
    background:rgba(255,255,255,0.95);
  }
  .detail-btn svg{
    width:12px;
    height:12px;
  }

  /* Grafiğin ekran yüksekliğine göre esnemesini sağlayan yeni container */
  .chart-container {
    flex: 1;
    min-height: 0; /* Flexbox dikey taşma bug'ını önler */
    position: relative;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  #plot {
    max-height: 100%;
    max-width: 100%;
    display: block;
  }

  .footer-text {
    font-size:10px; 
    color:var(--text-muted); 
    margin-top:8px;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="header-row">
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAasCA_BANNED_BASE64_FOR_BREVITY" alt="dataSpecta" class="logo" />
    <h1>Kayıp Risk Haritası</h1>
  </div>

  <div class="filter-row">  
    <div style="flex:1; min-width:200px;">
      <label style="font-size:12px; color:var(--text-secondary); display:flex; justify-content:space-between; align-items:center; margin-bottom: 4px;">
        <span>Son etkileşimden bu yana geçen gün eşiği</span>
        <span style="display:flex; align-items:center; gap:4px;">
          <input type="number" id="dayInput" value="180" min="0" max="365" step="5"
            style="width:54px; font-weight:700; text-align:right; border:1px solid var(--border-strong); border-radius:6px; padding:2px 4px; font-size:11px; color:var(--text-primary); font-family:inherit;" />
          <span style="font-weight:700; color:var(--text-primary);">gün</span>
        </span>
      </label>
      <input type="range" id="daySlider" min="0" max="365" step="5" value="180" style="width:100%; margin: 0;" />
    </div>
    <div style="flex:1; min-width:200px;">
      <label style="font-size:12px; color:var(--text-secondary); display:flex; justify-content:space-between; align-items:center; margin-bottom: 4px;">
        <span>Yaşam boyu değer (CLV) eşiği</span>
        <span style="display:flex; align-items:center; gap:4px;">
          <input type="number" id="clvInput" value="350000" min="0" max="750000" step="10000"
            style="width:80px; font-weight:700; text-align:right; border:1px solid var(--border-strong); border-radius:6px; padding:2px 4px; font-size:11px; color:var(--text-primary); font-family:inherit;" />
          <span style="font-weight:700; color:var(--text-primary);">₺</span>
        </span>
      </label>
      <input type="range" id="clvSlider" min="0" max="750000" step="10000" value="350000" style="width:100%; margin: 0;" />
    </div>
  </div>

  <div class="kpi-container">
    <div class="kpi-card" style="background:var(--bg-danger);">
      <button class="detail-btn" onclick="openDetail('crit','Kritik kayıp riski')" title="Müşteri listesini gör">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--text-danger)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M9 7h8v8"/></svg>
      </button>
      <p style="font-size:12px; font-weight:700; margin:0 0 2px; color:var(--text-danger);">Kritik kayıp riski</p>
      <p style="font-size:20px; font-weight:500; margin:0; color:var(--text-danger);" id="critCount">-</p>
      <p class="kpi-amount" style="color:var(--text-danger);" id="critShare">-</p>
      <p class="kpi-trend" style="color:var(--text-danger);" id="critTrend">-</p>
      <p class="kpi-action" style="color:var(--text-danger);" id="critAction">-</p>
    </div>
    <div class="kpi-card" style="background:var(--bg-warning);">
      <button class="detail-btn" onclick="openDetail('watch','Değerli ama aktif')" title="Müşteri listesini gör">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--text-warning)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M9 7h8v8"/></svg>
      </button>
      <p style="font-size:12px; font-weight:700; margin:0 0 2px; color:var(--text-warning);">Değerli ama aktif</p>
      <p style="font-size:20px; font-weight:500; margin:0; color:var(--text-warning);" id="watchCount">-</p>
      <p class="kpi-amount" style="color:var(--text-warning);" id="watchShare">-</p>
      <p class="kpi-trend" style="color:var(--text-warning);" id="watchTrend">-</p>
    </div>
    <div class="kpi-card" style="background:var(--surface-1);">
      <button class="detail-btn" onclick="openDetail('dormant','Doğal kayıp')" title="Müşteri listesini gör">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M9 7h8v8"/></svg>
      </button>
      <p style="font-size:12px; font-weight:700; margin:0 0 2px; color:var(--text-secondary);">Doğal kayıp</p>
      <p style="font-size:20px; font-weight:500; margin:0;" id="dormantCount">-</p>
      <p class="kpi-amount" style="color:var(--text-secondary);" id="dormantShare">-</p>
      <p class="kpi-trend" style="color:var(--text-secondary);" id="dormantTrend">-</p>
    </div>
    <div class="kpi-card" style="background:var(--bg-success);">
      <button class="detail-btn" onclick="openDetail('healthy','Sağlıklı müşteri')" title="Müşteri listesini gör">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--text-success)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M9 7h8v8"/></svg>
      </button>
      <p style="font-size:12px; font-weight:700; margin:0 0 2px; color:var(--text-success);">Sağlıklı müşteri</p>
      <p style="font-size:20px; font-weight:500; margin:0; color:var(--text-success);" id="healthyCount">-</p>
      <p class="kpi-amount" style="color:var(--text-success);" id="healthyShare">-</p>
      <p class="kpi-trend" style="color:var(--text-success);" id="healthyTrend">-</p>
    </div>
  </div>

  <!-- Grafik buradaki esnek kapsayıcı içinde dikey alana göre kendini boyutlandırıyor -->
  <div class="chart-container">
    <svg id="plot" viewBox="0 0 700 430" style="overflow:visible;">
      <text x="215" y="35" text-anchor="middle" font-size="12" font-weight="700" fill="var(--text-warning)">Değerli ama aktif</text>
      <text x="525" y="35" text-anchor="middle" font-size="12" font-weight="700" fill="var(--text-danger)">Kritik kayıp riski</text>
      <line x1="60" y1="20" x2="60" y2="360" stroke="var(--border-strong)" stroke-width="1"/>
      <line x1="60" y1="360" x2="680" y2="360" stroke="var(--border-strong)" stroke-width="1"/>
      <line id="vLine" x1="60" y1="20" x2="60" y2="360" stroke="var(--text-muted)" stroke-width="1" stroke-dasharray="4 3"/>
      <line id="hLine" x1="60" y1="360" x2="680" y2="360" stroke="var(--text-muted)" stroke-width="1" stroke-dasharray="4 3"/>
      <text x="215" y="382" text-anchor="middle" font-size="12" font-weight="700" fill="var(--text-success)">Sağlıklı müşteri</text>
      <text x="525" y="382" text-anchor="middle" font-size="12" font-weight="700" fill="var(--text-secondary)">Doğal kayıp</text>
      <text x="370" y="415" text-anchor="middle" font-size="12" font-weight="700" fill="var(--text-secondary)">Son etkileşimden bu yana geçen gün</text>
      <text x="20" y="190" text-anchor="middle" font-size="12" font-weight="700" fill="var(--text-secondary)" transform="rotate(-90 20 190)">Yaşam boyu değer (₺)</text>
      <g id="points"></g>
    </svg>
  </div>

  <p class="footer-text">dataSpecta BI · Mockup taslağı — örnek veri ile üretilmiştir</p>

</div>

<script>
/* Mevcut JS mantığın tamamen korunmuştur. Sadece Logo Base64'ünü kendi kodundakiyle değiştirmen yeterli. */
(function(){
  var W = 700, H = 420, padL = 60, padB = 60, padT = 20, padR = 20;
  var xMax = 365, yMax = 750000;
  var plotW = W - padL - padR, plotH = H - padT - padB;

  function xPix(v){ return padL + (v/xMax)*plotW; }
  function yPix(v){ return (H - padB) - (v/yMax)*plotH; }

  var firstNames = ["Ahmet","Mehmet","Ayşe","Fatma","Mustafa","Emine","Ali","Hatice","Hüseyin","Zeynep","İbrahim","Elif","Hasan","Meryem","İsmail","Özlem","Murat","Sevgi","Kemal","Derya","Burak","Gül","Serkan","Aylin","Volkan","Ebru","Onur","Pınar","Cem","Nazlı"];
  var lastNames = ["Yılmaz","Kaya","Demir","Şahin","Çelik","Yıldız","Yıldırım","Öztürk","Aydın","Özdemir","Arslan","Doğan","Kılıç","Aslan","Çetin","Kara","Koç","Kurt","Özkan","Şimşek"];
  var branches = ["İstanbul","Ankara","İzmir","Bursa","Antalya","Adana","Konya","Gaziantep","Kayseri","Mersin"];

  function trToAscii(s){
    var map = {'ç':'c','Ç':'C','ğ':'g','Ğ':'G','ı':'i','İ':'I','ö':'o','Ö':'O','ş':'s','Ş':'S','ü':'u','Ü':'U'};
    return s.replace(/[çÇğĞıİöÖşŞüÜ]/g, function(ch){ return map[ch]; }).toLowerCase();
  }

  function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

  function randomPhone(){
    var n = function(d){ var s=''; for(var i=0;i<d;i++) s+=Math.floor(Math.random()*10); return s; };
    return '05' + n(2) + ' ' + n(3) + ' ' + n(2) + ' ' + n(2);
  }

  function formatDate(d){
    return d.toLocaleDateString('tr-TR', {year:'numeric', month:'2-digit', day:'2-digit'});
  }

  var today = new Date();
  var statusPool = ['Atanmadı','Atanmadı','Aranıyor','Teklif Sunuldu','Kapatıldı'];

  var points = [];
  var n = 260;
  for (var i=0;i<n;i++){
    var day = Math.pow(Math.random(),1.15)*xMax;
    var base = 4000 + Math.random()*(yMax*0.85);
    var clv = Math.min(yMax, base * (0.6 + Math.random()*0.6));
    var size = 3 + Math.random()*5;

    var prevDay = clamp(day - (20 + Math.random()*20), 0, xMax);
    var prevClv = clv * (0.88 + Math.random()*0.14);

    var fn = pick(firstNames), ln = pick(lastNames);
    var joinDate = new Date(today.getTime() - Math.floor(Math.random()*6*365)*86400000);
    var lastActionDate = new Date(today.getTime() - Math.floor(day)*86400000);
    var segment = clv >= 400000 ? 'VIP' : (clv >= 120000 ? 'Standart' : 'Başlangıç');
    var status = pick(statusPool);

    points.push({
      day:day, clv:clv, r:size, prevDay:prevDay, prevClv:prevClv,
      id: 'MST-' + (1000+i),
      ad: fn + ' ' + ln,
      email: trToAscii(fn) + '.' + trToAscii(ln) + (i) + '@ornekmail.com',
      telefon: randomPhone(),
      girisTarihi: formatDate(joinDate),
      sonIslemTarihi: formatDate(lastActionDate),
      segment: segment,
      sube: pick(branches),
      status: status
    });
  }

  var svgPoints = document.getElementById('points');
  points.forEach(function(p){
    var c = document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx', xPix(p.day));
    c.setAttribute('cy', yPix(p.clv));
    c.setAttribute('r', p.r);
    c.setAttribute('fill-opacity', '0.75');
    svgPoints.appendChild(c);
    p.el = c;
  });

  var colors = {
    crit: '#E24B4A',
    watch: '#EF9F27',
    dormant: '#B8B4A4',
    healthy: '#1D9E75'
  };

  var daySlider = document.getElementById('daySlider');
  var clvSlider = document.getElementById('clvSlider');
  var dayInput = document.getElementById('dayInput');
  var clvInput = document.getElementById('clvInput');
  var vLine = document.getElementById('vLine');
  var hLine = document.getElementById('hLine');

  var dayT = parseInt(daySlider.value, 10);
  var clvT = parseInt(clvSlider.value, 10);

  function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }

  function formatCurrencyShort(v){
    if (v >= 1000000) return (v/1000000).toFixed(2).replace('.', ',') + ' M ₺';
    if (v >= 1000) return Math.round(v/1000) + ' bin ₺';
    return Math.round(v) + ' ₺';
  }

  function update(){
    dayInput.value = dayT;
    clvInput.value = clvT;
    daySlider.value = dayT;
    clvSlider.value = clvT;

    var xPixT = xPix(dayT);
    var yPixT = yPix(clvT);
    vLine.setAttribute('x1', xPixT); vLine.setAttribute('x2', xPixT);
    hLine.setAttribute('y1', yPixT); hLine.setAttribute('y2', yPixT);

    var counts = {crit:0, watch:0, dormant:0, healthy:0};
    var clvSums = {crit:0, watch:0, dormant:0, healthy:0};
    var prevCounts = {crit:0, watch:0, dormant:0, healthy:0};
    var critUnassigned = 0;
    var totalClv = 0;

    function categorize(day, clv){
      var highDay = day >= dayT;
      var highClv = clv >= clvT;
      if (highDay && highClv) return 'crit';
      if (!highDay && highClv) return 'watch';
      if (highDay && !highClv) return 'dormant';
      return 'healthy';
    }

    points.forEach(function(p){
      var key = categorize(p.day, p.clv);
      var prevKey = categorize(p.prevDay, p.prevClv);
      p.cat = key;
      p.el.setAttribute('fill', colors[key]);
      counts[key]++;
      clvSums[key]+=p.clv;
      totalClv += p.clv;
      prevCounts[prevKey]++;
      if (key === 'crit' && p.status === 'Atanmadı') critUnassigned++;
    });

    function pct(v){ return totalClv ? (100*v/totalClv).toFixed(1)+'%' : '0%'; }

    function trendHtml(key, goodDirection){
      var delta = counts[key] - prevCounts[key];
      if (delta === 0) return '— geçen aya göre değişim yok';
      var up = delta > 0;
      var arrow = up ? '▲' : '▼';
      var isGood = up ? goodDirection === 'up' : goodDirection === 'down';
      var word = isGood ? 'iyi yönde' : 'kötü yönde';
      return arrow + ' ' + (up ? '+' : '') + delta + ' geçen aya göre (' + word + ')';
    }

    document.getElementById('critCount').textContent = counts.crit;
    document.getElementById('critShare').textContent = formatCurrencyShort(clvSums.crit) + ' toplam CLV · ' + pct(clvSums.crit) + ' payı';
    document.getElementById('critTrend').textContent = trendHtml('crit', 'down');
    document.getElementById('critAction').textContent = critUnassigned + ' aksiyon alınmamış';

    document.getElementById('watchCount').textContent = counts.watch;
    document.getElementById('watchShare').textContent = formatCurrencyShort(clvSums.watch) + ' toplam CLV · ' + pct(clvSums.watch) + ' payı';
    document.getElementById('watchTrend').textContent = trendHtml('watch', 'down');

    document.getElementById('dormantCount').textContent = counts.dormant;
    document.getElementById('dormantShare').textContent = formatCurrencyShort(clvSums.dormant) + ' toplam CLV · ' + pct(clvSums.dormant) + ' payı';
    document.getElementById('dormantTrend').textContent = trendHtml('dormant', 'down');

    document.getElementById('healthyCount').textContent = counts.healthy;
    document.getElementById('healthyShare').textContent = formatCurrencyShort(clvSums.healthy) + ' toplam CLV · ' + pct(clvSums.healthy) + ' payı';
    document.getElementById('healthyTrend').textContent = trendHtml('healthy', 'up');
  }

  daySlider.addEventListener('input', function(){
    dayT = parseInt(daySlider.value, 10);
    update();
  });
  clvSlider.addEventListener('input', function(){
    clvT = parseInt(clvSlider.value, 10);
    update();
  });
  dayInput.addEventListener('input', function(){
    var v = parseInt(dayInput.value, 10);
    if (isNaN(v)) return;
    dayT = clamp(v, 0, xMax);
    update();
  });
  clvInput.addEventListener('input', function(){
    var v = parseInt(clvInput.value, 10);
    if (isNaN(v)) return;
    clvT = clamp(v, 0, yMax);
    update();
  });

  window.openDetail = function(catKey, label){
    var filtered = points.filter(function(p){ return p.cat === catKey; }).map(function(p){
      return {
        id: p.id, ad: p.ad, email: p.email, telefon: p.telefon,
        girisTarihi: p.girisTarihi, sonIslemTarihi: p.sonIslemTarihi,
        segment: p.segment, sube: p.sube, durum: p.status,
        clv: Math.round(p.clv), gun: Math.round(p.day)
      };
    });
    sessionStorage.setItem('churnDetayList', JSON.stringify(filtered));
    sessionStorage.setItem('churnDetayLabel', label);
    window.open('detay.html', '_blank');
  };

  update();
})();
</script>
</body>
</html>
